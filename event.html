<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Dinner for Joe</title>
  <meta
    name="description"
    content="A birthday dinner invitation for Joe with RSVP."
  />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-1ycn6IcaQQ40jIh1z1sCkP2J7Z8f2U2x7lN7E3z2J2Y0fM0v+9JQ4Q+8YQ6X8w+9b1K2p1Q2K5A2H6P7A3b0w=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <!-- Your stylesheet later -->
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="invite-page">
    <section class="hero" aria-labelledby="invite-title">
      <div class="hero__ornaments" aria-hidden="true">
        <svg class="doodle doodle--one" viewBox="0 0 260 260" fill="none">
          <path
            d="M40 150C75 60 170 35 220 92C248 125 243 182 205 212C167 242 107 239 71 205"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-dasharray="8 10"
          />
          <circle cx="58" cy="56" r="4" fill="currentColor" />
          <circle cx="202" cy="88" r="5" fill="currentColor" />
          <circle cx="212" cy="204" r="4" fill="currentColor" />
        </svg>

        <svg class="doodle doodle--two" viewBox="0 0 220 220" fill="none">
          <path
            d="M110 18L126 84L192 100L126 116L110 182L94 116L28 100L94 84L110 18Z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linejoin="round"
          />
        </svg>

        <svg class="doodle doodle--three" viewBox="0 0 180 180" fill="none">
          <path
            d="M26 108C48 80 74 66 94 66C118 66 138 80 154 108"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
          <path
            d="M46 116C62 102 78 95 94 95C110 95 126 102 142 116"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
      </div>

      <div class="hero__media" aria-hidden="true">
        <figure class="photo-frame photo-frame--main">
          <img
            src="https://images.unsplash.com/photo-1517365830460-955ce3ccd263?auto=format&fit=crop&w=1200&q=80"
            alt="Joe photo placeholder 1"
          />
        </figure>

        <figure class="photo-frame photo-frame--accent">
          <img
            src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=1200&q=80"
            alt="Joe photo placeholder 2"
          />
        </figure>

        <svg class="hero__halo" viewBox="0 0 600 600" fill="none" aria-hidden="true">
          <circle cx="300" cy="300" r="245" stroke="currentColor" stroke-width="2" stroke-dasharray="12 14" />
          <circle cx="300" cy="300" r="205" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 12" />
        </svg>
      </div>

      <div class="hero__copy">
        <p class="eyebrow">
          <i class="fa-solid fa-gem"></i>
          Birthday dinner invitation
        </p>

        <h1 id="invite-title">Joe</h1>

        <p class="hero__lead">
          Please join us for a birthday dinner to celebrate Joe.
        </p>

        <div class="event-card">
          <div class="event-card__row">
            <span class="event-card__icon">
              <i class="fa-regular fa-calendar"></i>
            </span>
            <span class="event-card__text">Saturday, 30 May</span>
          </div>

          <div class="event-card__row">
            <span class="event-card__icon">
              <i class="fa-regular fa-clock"></i>
            </span>
            <span class="event-card__text">7:00 PM</span>
          </div>

          <div class="event-card__row">
            <span class="event-card__icon">
              <i class="fa-solid fa-location-dot"></i>
            </span>
            <span class="event-card__text">
              Acqua Bistecca, DC<br />
              10 Ridge Square NW<br />
              Washington, DC 20016
            </span>
          </div>
        </div>

        <a class="hero__cta" href="#rsvp">
          <i class="fa-solid fa-circle-check"></i>
          RSVP
        </a>
      </div>
    </section>

    <section class="rsvp-section" id="rsvp" aria-labelledby="rsvp-title">
      <div class="rsvp-card">
        <div class="rsvp-card__head">
          <p class="rsvp-card__eyebrow">
            <i class="fa-solid fa-pen-nib"></i>
            RSVP
          </p>
          <h2 id="rsvp-title">Please confirm attendance</h2>
        </div>

        <form class="rsvp-form" action="#" method="post">
          <div class="field">
            <label for="name">Name</label>
            <div class="input-wrap">
              <i class="fa-regular fa-user"></i>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Your name"
                autocomplete="name"
                required
              />
            </div>
          </div>

          <div class="field field--checkbox">
            <label class="check-card" for="attending">
              <input
                type="checkbox"
                id="attending"
                name="attending"
                value="yes"
              />
              <span class="check-card__box" aria-hidden="true"></span>
              <span class="check-card__content">
                <span class="check-card__title">I will attend</span>
                <span class="check-card__sub">
                  Tap to confirm you will be there
                </span>
              </span>
            </label>
          </div>

          <button type="submit" class="submit-btn">
            <i class="fa-solid fa-paper-plane"></i>
            Send RSVP
          </button>
        </form>
      </div>
    </section>
  </main>

  <!-- Your script later -->
  <script src="./scripts.js"></script>
</body>
</html>
